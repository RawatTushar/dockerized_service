name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/node-secret-app:latest .

      - run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/node-secret-app:latest

  deploy:
    needs: build

    runs-on: ubuntu-latest

    steps:

      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            docker pull \
              ${{ secrets.DOCKER_USERNAME }}/node-secret-app:latest

            docker stop node-secret-app || true

            docker rm node-secret-app || true

            docker run -d \
              --name node-secret-app \
              --restart always \
              --env-file ~/.env \
              -p 3000:3000 \
              ${{ secrets.DOCKER_USERNAME }}/node-secret-app:latest